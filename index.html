<!doctype html>
<html lang="zh-CN" data-ui-language="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>小红书一键存图</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23ff2442'/%3E%3Cpath d='M19 20h26v6H19zm0 11h19v6H19zm0 11h26v6H19z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="phone-app">
      <section class="hero">
        <div class="hero-top">
          <p class="eyebrow" data-i18n="heroEyebrow">小红书图文保存</p>
          <div id="languageSwitch" class="lang-switch" role="group" aria-label="Language">
            <button type="button" class="lang-option is-active" data-lang="zh" aria-pressed="true">
              中文
            </button>
            <button type="button" class="lang-option" data-lang="en" aria-pressed="false">EN</button>
          </div>
        </div>
        <p class="hero-copy" data-i18n="heroCopy">
          支持所有小红书公开笔记。整理完就能看正文、标签和图片视频，想存哪张就点哪张，无水印。
        </p>
      </section>

      <section class="capture-panel">
        <label class="field">
          <span class="field-label" data-i18n="fieldLabel">贴小红书链接</span>
          <textarea
            id="sourceInput"
            rows="4"
            data-i18n-placeholder="sourcePlaceholder"
            placeholder="把小红书链接或分享文案贴到这里"
          ></textarea>
        </label>
        <div class="button-stack">
          <button id="captureButton" class="primary-button" data-i18n="captureButton">开始整理</button>
          <button id="saveAllButton" class="secondary-button" type="button" disabled>
            保存所有图片
          </button>
        </div>
        <p id="statusText" class="status-text">当前只看这一条，刷新页面会重新开始。</p>
      </section>

      <section id="resultSection" class="result-shell is-empty">
        <div class="result-head">
          <div>
            <p class="section-label" data-i18n="resultLabel">当前内容</p>
            <h2 id="resultTitle">还没有内容</h2>
          </div>
          <div class="result-actions">
            <a id="sourceLink" class="ghost-link hidden" target="_blank" rel="noreferrer" data-i18n="sourceLink">去原帖</a>
          </div>
        </div>

        <div id="metaRow" class="meta-row hidden">
          <span id="publishedPill" class="meta-pill hidden"></span>
          <span id="ipPill" class="meta-pill hidden"></span>
        </div>

        <div id="statsGrid" class="stats-grid hidden">
          <article class="stat-block">
            <span class="stat-label" data-i18n="authorLabel">博主</span>
            <strong id="authorValue">—</strong>
          </article>
          <article class="stat-block">
            <span class="stat-label" data-i18n="likeLabel">点赞</span>
            <strong id="likeValue">—</strong>
          </article>
          <article class="stat-block">
            <span class="stat-label" data-i18n="collectLabel">收藏</span>
            <strong id="collectValue">—</strong>
          </article>
          <article class="stat-block">
            <span class="stat-label" data-i18n="commentLabel">评论</span>
            <strong id="commentValue">—</strong>
          </article>
          <article class="stat-block">
            <span class="stat-label" data-i18n="shareLabel">分享</span>
            <strong id="shareValue">—</strong>
          </article>
        </div>

        <section class="detail-block">
          <p class="section-label" data-i18n="descriptionLabel">正文</p>
          <div id="descriptionValue" class="description">整理完成后，这里会显示去掉标签后的正文。</div>
        </section>

        <section id="tagsSection" class="detail-block hidden">
          <p class="section-label" data-i18n="tagsLabel">标签</p>
          <div id="tagsValue" class="tag-list"></div>
        </section>

        <section id="mediaSection" class="detail-block hidden">
          <div class="section-head">
          <p class="section-label" data-i18n="mediaLabel">媒体</p>
            <div class="section-tools">
              <span id="mediaCount" class="section-count"></span>
              <button id="refreshMediaButton" class="text-button hidden" type="button" data-i18n="refreshMedia">重试预览</button>
            </div>
          </div>
          <div id="mediaGrid" class="media-grid"></div>
        </section>
      </section>

      <footer class="legal-note" data-i18n="legalNote">
        免责声明：版权归平台及作者所有，本程序不储存任何内容。
      </footer>
    </main>

    <script src="/lib/i18n.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
